basics:
  name: Steve Landey
  email: steve@stevelandey.com
  url: https://stevelandey.com
  location:
    city: Kirkland, WA
  summary: >
    Staff Engineer with a passion for helping engineering teams move fast and fix things. Not open to relocation.

work:
  - name: Descript
    position: Staff Engineer, Client Platform Engineering
    startDate: "2025"
    endDate: "present"
    summary: |
      I joined a two-person platform team responsible for CI, client architecture (React/Redux), the design system, monorepo health, and the Electron app. The team had recently lost most of its institutional knowledge, and the monorepo had significant consistency problems across 150+ packages.

      I've been the driver for engineer quality-of-life. I've done overdue major version upgrades to React, Node, Storybook, Turborepo, and pnpm. I've resolved tragedy-of-the-commons issues like dependency governance and flaky tests through tooling, collaboration, and just getting things done. I make sure our codebase works on all major coding agent sandboxes like Claude, Codex, and Cursor, and that the agentic coding experience is great. I've built tools that everyone uses and extends to get their work done, including some that are now open source.

  - name: Asana
    position: Engineering Manager (2018-2020), Staff Mobile Engineer (2020-2024), AI Workflows (2024)
    startDate: "2018"
    endDate: "2024"
    summary: |
      During my long and rewarding time at Asana, I held multiple roles. I joined in 2018 as the manager of the iOS and Android teams. In 2020 I pivoted to Staff Engineer on Mobile Foundations doing core architecture and developer experience work, transforming the startup-grade single-module ObjC codebase into a scalable, multi-module Swift codebase. Some of my hackathon prototypes are now prominent surfaces in the app, such as the Home tab.

      While at Asana, I released the open source project Locheck, a localization linter now used by many companies, including GitHub. I was also responsible for managing the engineering blog for most of 2018-2025.

      In 2024, I pivoted out of mobile to work on the AI Workflows feature, solving tricky prompt engineering problems and helping ship a new product fast at a critical time in the industry. I built internal tools that are still in use across the company.

  - name: Hipmunk
    position: iOS Engineer (2015), Mobile Team Lead (2016), Engineering Manager (2017-2018)
    startDate: "2015"
    endDate: "2018"
    summary: |
      I helped move Hipmunk’s iOS codebase from startup spaghetti to MVVM while keeping a fast pace shipping features. I rewrote the mobile web flight search UI on a tight deadline to support acquisition by Concur, and integrated it seamlessly into the mobile apps to replace the native flight search UIs, while maintaining great UX. As a manager, I owned the mobile recruiting pipeline and hired 3 engineers.
    breakAfter: true

  - name: Graffiti Labs
    position: Full Stack Engineer, Game Designer
    startDate: "2012"
    endDate: "2015"
    summary: |
      As one of two engineers, I helped design and build a realtime browser-based multiplayer sandbox building game played by thousands of people. I worked with performance-sensitive JavaScript, websockets, iOS (Swift and Obj-C), React, and Python.

  - name: Yelp
    position: Software Engineer on the Spam Team
    startDate: "2011"
    endDate: "2012"
    summary: |
      I worked on systems that ensure yelp.com only shows authentic reviews, including algorithms and internal tools. I also maintained mrjob, a popular framework that runs Python code on Hadoop.

  - name: Apple
    position: Intern on Obj-C Runtime Team
    startDate: "2010"
    endDate: "2010"
    summary: |
      I implemented an early prototype of the Xcode visual object graph debugging tool.

  - name: MIM Software
    position: Intern
    startDate: "2009"
    endDate: "2009"
    summary: |
      I built the first prototype of MIMcloud, a web site for HIPAA-compliant medical image sharing.

